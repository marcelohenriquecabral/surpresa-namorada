<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para o Amor da Minha Vida ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Tela Inicial -->
    <div id="tela-inicial" class="container">
        <h1>Feliz 2 Anos de Namoro! 🌹</h1>
        <p>Preparei algo muito especial para você. Clique no botão abaixo:</p>
        <button id="btn-iniciar">Abrir Minha Surpresa ❤️</button>
    </div>

    <!-- Tela da Surpresa (Inicia Escondida) -->
    <div id="tela-video" class="container escondido">
        <div class="video-wrapper">
            <div style="display: flex; justify-content: center; margin: 10px 0;">
                <div style="position: relative; width: 100%; max-width: 320px; aspect-ratio: 9 / 16; overflow: hidden; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.15);">
                    <iframe src="https://youtube.com" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>
        <div class="carta-gigante">
            <h2>Nossa História em Detalhes 📖</h2>
            <!-- O texto completo da carta está no repositório referenciado -->
            <p>Para minha Uzi! 🤍💛💙...</p>
            <p>Feliz dois anos de namoro, minha Uzi. Minha Bianca. Minha namorada, minha melhor amiga e o grande amor da minha vida. Te amo daqui até o infinito...</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
